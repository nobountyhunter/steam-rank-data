name: Update Steam Top Sellers Ranks

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch ranks directly from Steam
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, sys, time, datetime, re

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml",
              "Accept-Language": "en-US,en;q=0.9",
              "Cookie": "birthtime=0; mature_content=1; lastagecheckage=1-0-1990",
          }

          # appId from Steam search result URLs: /app/730/
          APPID_RE = re.compile(r'/app/(\d{1,12})/')

          all_ranks = {}
          page_size = 100
          start = 0
          max_results = 9999
          retries = 3

          while start < max_results:
              url = (
                  f"https://store.steampowered.com/search/results/"
                  f"?filter=globaltopsellers&start={start}&count={page_size}"
                  f"&json=1&cc=us&l=english&ignore_preferences=1"
              )

              html = None
              for attempt in range(retries):
                  try:
                      req = urllib.request.Request(url, headers=HEADERS)
                      with urllib.request.urlopen(req, timeout=15) as r:
                          raw = r.read().decode("utf-8", errors="replace")
                      html = raw
                      break
                  except Exception as e:
                      print(f"  start={start} attempt {attempt+1} error: {e}", file=sys.stderr)
                      time.sleep(3)

              if html is None:
                  print(f"  Skipping start={start} after {retries} failures")
                  start += page_size
                  continue

              # Parse appIds from result links
              appids = APPID_RE.findall(html)
              # Deduplicate preserving order
              seen = []
              for a in appids:
                  if a not in seen:
                      seen.append(a)
              appids = seen

              if not appids:
                  print(f"  No results at start={start}, stopping.")
                  break

              added = 0
              for appid in appids:
                  rank = start + len(all_ranks) - sum(1 for _ in range(start) if _ < start) + 1
                  # Simpler: rank = position in overall list
                  rank = len(all_ranks) + 1
                  if appid not in all_ranks:
                      all_ranks[appid] = rank
                      added += 1

              print(f"start={start}: +{added} (total: {len(all_ranks)})")

              if len(appids) < page_size:
                  print(f"  Steam returned {len(appids)} < {page_size}, reached end.")
                  break

              start += page_size
              time.sleep(0.3)

          print(f"\nTotal collected: {len(all_ranks)} games")

          if len(all_ranks) < 50:
              print("ERROR: too few results", file=sys.stderr)
              sys.exit(1)

          output = {
              "updatedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "generatedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "source": "steam_globaltopsellers",
              "total": len(all_ranks),
              "ranks": all_ranks
          }
          with open("ranks.json", "w") as f:
              json.dump(output, f, separators=(",", ":"))
          print(f"OK: {len(all_ranks)} games written to ranks.json")
          PYEOF

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          commit_message: "chore: update ranks (${{ github.run_number }})"
          force_orphan: false
